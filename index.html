<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;

      background: linear-gradient(-45deg, #000000, #1a1a1a, #2b2b2b, #111111);
      background-size: 400% 400%;
      animation: gradientMove 12s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 500;
      margin-bottom: 15px;
    }

    p {
      font-size: 1rem;
      color: #cccccc;
      margin-bottom: 20px;
    }

    #countdown {
      font-size: 1.5rem;
      letter-spacing: 1px;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>This website hasn't been set up yet</h1>
    <p>yes, declan hasn't coded this website yet...please wait until April 29 @ 7:00am</p>
    <div id="countdown">Loading...</div>
  </div>

  <script>
    // Set target date (April 28 @ 7:00 AM)
    const targetDate = new Date("April 29, 2026 07:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        document.getElementById("countdown").innerHTML = "It's live 🚀";
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      document.getElementById("countdown").innerHTML =
        `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
