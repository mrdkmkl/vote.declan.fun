<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>the vote · may 9</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- VIEW: MAIN -->
  <section class="view" id="view-main">
    <div class="hero">

      <div class="countdown-wrap">
        <div class="cd-unit">
          <span class="cd-num" id="cd-days">00</span>
          <span class="cd-label">days</span>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <span class="cd-num" id="cd-hours">00</span>
          <span class="cd-label">hrs</span>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <span class="cd-num" id="cd-mins">00</span>
          <span class="cd-label">min</span>
        </div>
        <div class="cd-sep">:</div>
        <div class="cd-unit">
          <span class="cd-num" id="cd-secs">00</span>
          <span class="cd-label">sec</span>
        </div>
      </div>

      <div class="action-group">
        <a href="https://forms.gle/91VpsHUhBbFj8our6" target="_blank" rel="noopener" class="btn btn-primary">
          cast your vote
        </a>
        <button class="btn btn-ghost" id="stats-btn">see stats →</button>
      </div>

      <div class="last-updated" id="last-updated-main">—</div>
    </div>
  </section>

  <!-- VIEW: STATS -->
  <section class="view view-right" id="view-stats">
    <header class="stats-bar">
      <button class="btn-back" id="back-btn">← back</button>
      <div class="stats-bar-right">
        <span class="last-updated" id="last-updated-stats">—</span>
        <button class="refresh-btn" id="refresh-btn">↻</button>
      </div>
    </header>

    <div class="stats-scroll">
      <div class="stats-content">

        <div class="state-row" id="state-loading">
          <div class="spinner"></div>
          <span>fetching votes…</span>
        </div>

        <div class="state-row hidden" id="state-error">
          ⚠ couldn't load — check <code>GITHUB_VOTES_URL</code> in script.js
        </div>

        <div class="state-row hidden" id="state-noconfig">
          set <code>GITHUB_VOTES_URL</code> in script.js to your raw github file url
        </div>

        <div class="chart-area" id="chart-area"></div>

        <div class="total-row" id="total-votes"></div>

      </div>
    </div>
  </section>

  <a href="https://youtube.com/@mrdkmkl" target="_blank" rel="noopener" class="footer-credit">
    made by @mrdkmkl
  </a>

  <script src="script.js"></script>
</body>
</html>
